name: Scheduled DOT Alerts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_kakao:
        description: "카카오 나에게 보내기 연결 테스트만 실행"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: scheduled-dot-alerts
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_COIN_F1318: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COIN_F1318 }}
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      WATCHLIST_SYMBOLS: ${{ secrets.WATCHLIST_SYMBOLS }}
      SITE_URL: https://dot.sanghak.kr
      KAKAO_TEST_MESSAGE: ${{ inputs.test_kakao || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install function dependencies
        run: npm --prefix functions ci

      - name: Check alert secrets
        run: |
          missing=0
          required_keys="KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN"
          if [ "$KAKAO_TEST_MESSAGE" != "true" ]; then
            required_keys="FIREBASE_SERVICE_ACCOUNT_COIN_F1318 $required_keys"
          fi
          for key in $required_keys; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Scan coins or send Kakao test
        run: node scripts/github-scheduled-alert.mjs
